<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stellar Trivia — Stellar Arcade</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="stars"></div>
  <main>
    <header class="site">
      <h1>🧠 Stellar <span class="teal">Trivia</span></h1>
      <p class="sub">10 questions · 2 XLM per correct answer · one run per wallet · ~2 minutes</p>
    </header>

    <!-- Lobby -->
    <div class="card center" id="lobby">
      <div class="row">
        <span class="pill"><span class="dot" id="walletDot"></span><span id="walletLabel">No wallet connected</span></span>
        <span class="pill">Max win: <b class="teal">20 XLM</b></span>
      </div>
      <p class="mt muted">Answer fast — you have 12 seconds per question. Winnings arrive in one payment at the end.</p>
      <div class="row mt">
        <button class="btn ghost" id="connectBtn">Connect Wallet</button>
        <button class="btn secondary" id="startBtn" disabled>Pay 0.5 XLM &amp; Start</button>
      </div>
      <p class="status" id="lobbyStatus"></p>
    </div>

    <!-- Game -->
    <div class="card" id="game" style="display:none">
      <div class="progress" id="progress"></div>
      <div class="timerbar"><i id="timerFill" style="width:100%"></i></div>
      <div class="qtext" id="qtext"></div>
      <div class="choices" id="choices"></div>
      <div class="funfact" id="funfact" style="display:none"></div>
      <p class="scoreline center">Score: <b id="score">0</b> correct · <b class="teal" id="earned">0 XLM</b> earned</p>
    </div>

    <!-- Finale -->
    <div class="card center" id="finale" style="display:none">
      <div style="font-size:3rem" id="finEmoji">🎉</div>
      <div class="bigscore"><span id="finScore"></span>/10</div>
      <p class="mt" id="finXlm"></p>
      <p class="muted small mt" id="finPayout"></p>
      <p class="mt"><a class="btn" href="/">Back to the Arcade</a></p>
    </div>

    <p class="center mt"><a class="muted small" href="/">← Stellar Arcade</a></p>
  </main>

  <script type="module">
    import { pickWallet } from "/js/wallet.js";
    import { fetchWithX402 } from "/js/x402-client.js";

    const $ = (id) => document.getElementById(id);
    const QUESTION_SECONDS = 12;
    const wallet = pickWallet();
    let address = null, token = null, timer = null, deadline = 0, answering = false;
    let explorer = "https://stellar.expert/explorer/testnet";
    let results = []; // true/false per question

    function setStatus(msg, err = false) {
      const el = $("lobbyStatus");
      el.textContent = msg;
      el.className = "status" + (err ? " err" : "");
    }

    $("connectBtn").onclick = async () => {
      try {
        setStatus("Connecting wallet…");
        address = await wallet.connect();
        $("walletDot").classList.add("on");
        $("walletLabel").textContent = `${wallet.label()}: ${address.slice(0, 4)}…${address.slice(-4)}`;
        const cfg = await (await fetch(`/api/trivia/config?address=${address}`)).json();
        if (cfg.explorer) explorer = cfg.explorer;
        if (cfg.playsUsed >= cfg.maxPlays) {
          setStatus("This wallet already played its one run. 🏁", true);
        } else {
          $("startBtn").disabled = false;
          setStatus("Wallet connected. Ready when you are!");
        }
      } catch (e) { setStatus(e.message, true); }
    };

    $("startBtn").onclick = async () => {
      $("startBtn").disabled = true;
      try {
        setStatus("Starting… (x402 payment: 0.5 XLM)");
        const res = await fetchWithX402("/api/trivia/session", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ address }),
        }, wallet);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `Could not start (${res.status})`);
        token = data.token;
        $("lobby").style.display = "none";
        $("game").style.display = "block";
        renderProgress(0);
        showQuestion(data.question);
      } catch (e) {
        setStatus(e.message, true);
        $("startBtn").disabled = false;
      }
    };

    function renderProgress(current) {
      $("progress").innerHTML = "";
      for (let i = 0; i < 10; i++) {
        const s = document.createElement("span");
        if (i < results.length) s.className = results[i] ? "done" : "bad";
        else if (i === current) s.className = "now";
        $("progress").appendChild(s);
      }
    }

    function showQuestion(q) {
      answering = false;
      $("funfact").style.display = "none";
      $("qtext").textContent = `Q${q.number}. ${q.q}`;
      const box = $("choices");
      box.innerHTML = "";
      q.choices.forEach((c, i) => {
        const b = document.createElement("button");
        b.className = "choice";
        b.textContent = c;
        b.onclick = () => submit(i, b);
        box.appendChild(b);
      });
      deadline = Date.now() + QUESTION_SECONDS * 1000;
      clearInterval(timer);
      timer = setInterval(() => {
        const left = Math.max(0, deadline - Date.now());
        $("timerFill").style.width = `${(left / (QUESTION_SECONDS * 1000)) * 100}%`;
        if (left <= 0 && !answering) submit(-1, null); // time's up -> wrong
      }, 200);
    }

    async function submit(choiceIndex, btn) {
      if (answering) return;
      answering = true;
      clearInterval(timer);
      document.querySelectorAll(".choice").forEach((b) => (b.disabled = true));
      try {
        const res = await fetch("/api/trivia/answer", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, choiceIndex }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Answer failed");

        results.push(data.correct);
        const buttons = document.querySelectorAll(".choice");
        buttons[data.correctIndex]?.classList.add("correct");
        if (!data.correct && btn) btn.classList.add("wrong");
        $("score").textContent = data.score;
        $("earned").textContent = `${data.score * 2} XLM`;
        $("funfact").textContent = (data.correct ? "✅ " : data.tooSlow ? "⏰ Too slow! " : "❌ ") + data.funFact;
        $("funfact").style.display = "block";
        renderProgress(data.questionNumber);

        setTimeout(() => {
          if (data.done) finish(data);
          else showQuestion(data.question);
        }, 2600);
      } catch (e) {
        $("funfact").textContent = `⚠ ${e.message}`;
        $("funfact").style.display = "block";
      }
    }

    function finish(data) {
      $("game").style.display = "none";
      $("finale").style.display = "block";
      $("finScore").textContent = data.score;
      $("finEmoji").textContent = data.score >= 8 ? "🏆" : data.score >= 5 ? "🎉" : "🌱";
      $("finXlm").innerHTML = data.totalXlm > 0
        ? `You earned <b class="teal">${data.totalXlm} XLM</b>!`
        : "No XLM this time — but now you know your Stellar lore.";
      const p = data.payout || {};
      $("finPayout").innerHTML =
        p.status === "paid"
          ? `Paid in one transaction · tx <a href="${explorer}/tx/${p.tx}" target="_blank" rel="noopener"><code>${p.tx.slice(0, 12)}…</code></a>`
          : p.status === "skipped" && p.reason === "zero_score" ? ""
          : p.status === "skipped" ? "Payout pending (no hot wallet configured on server)."
          : `Payout issue — see booth staff. ${p.error ?? ""}`;
    }
  </script>
</body>
</html>
